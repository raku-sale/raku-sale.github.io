<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>楽天エントリー一覧｜エントリー忘れ防止</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  max-width: 700px;
  margin: 10px auto;
  padding: 0 6px;
  color: #222;
}

/* タイトル */
h1 {
  font-size: 24px;
  margin-bottom: 10px;
  white-space: nowrap;
}

/* 【】部分だけ小さく */
.small {
  font-size: 14px;
  color: #666;
}

/* 更新日（少し大きく＆控えめ） */
.update {
  font-size: 16px;
  color: #666;
  margin-bottom: 10px;
}

/* お知らせ（しっかり目立たせる） */
.notice {
  font-size: 18px;
  font-weight: 600;
  color: #222;
  margin: 14px 0;
}

/* ボタン */
.button {
  display: block;
  text-align: center;
  padding: 12px;
  margin-bottom: 18px;
  background-color: #4da6ff;
  color: #fff;
  font-size: 16px;
  text-decoration: none;
  border-radius: 6px;
}

/* セール行 */
.item {
  display: flex;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid #eee;
}

/* セール名 */
.title a {
  color: #4da6ff;
  text-decoration: none;
  font-size: 17px;
  font-weight: 600;
}

/* 情報 */
.info {
  font-size: 14px;
  color: #333;
  white-space: nowrap;
}
</style>
</head>

<body>

<h1>
楽天エントリー一覧
<span class="small">【エントリー忘れ防止】</span>
</h1>

<div class="update">
更新日：2026/03/31 11:34
</div>

<div class="notice">
本日エントリー可能なキャンペーンはありません
</div>

<a href="https://oubo.rakuten.co.jp/list" target="_blank" class="button">
エントリー履歴を見る
</a>

</body>
</html>
