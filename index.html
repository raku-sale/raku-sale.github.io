<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本日開催中の楽天セール一覧</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  max-width: 700px;
  margin: 10px auto;
  padding: 0 6px;
  color: #222;
}
h1 { font-size: 28px; margin-bottom: 8px; }
.update { font-size: 14px; color: #666; margin-bottom: 18px; font-weight: bold; }
.section { margin-top: 28px; font-weight: bold; font-size: 19px; padding-bottom: 6px; }
.rakuten { color: #bf0000; border-bottom: 2px solid #bf0000; }
.other { color: #2e7d32; border-bottom: 2px solid #2e7d32; }
.item { display: flex; justify-content: space-between; align-items: flex-start; padding: 16px 0; border-bottom: 1px solid #eee; flex-wrap: wrap; }
.title { flex: 1 1 60%; margin-bottom: 6px; }
.title a { color: #4da6ff; text-decoration: none; font-size: 18px; font-weight: 600; word-break: break-word; }
.info { flex: 1 1 35%; font-size: 14px; color: #333; text-align: right; line-height: 1.6; }
.info div { white-space: normal; }
.title a:hover { text-decoration: underline; }
@media screen and (max-width: 480px) {
  h1 { font-size: 24px; }
  .title a { font-size: 16px; }
  .info { font-size: 13px; text-align: left; }
}
</style>
</head>

<body>

<h1>本日開催中の楽天セール一覧</h1>
<div class="update" id="update-date"></div>

<div class="section rakuten">楽天市場</div>
<div id="rakuten-sales"></div>

<div class="section other">その他サービス</div>
<div id="other-sales"></div>

<script>
// 今日の日付
const today = new Date();
const yyyy = today.getFullYear();
const mm = String(today.getMonth()+1).padStart(2,'0');
const dd = String(today.getDate()).padStart(2,'0');
document.getElementById('update-date').textContent = `更新日：${yyyy}/${mm}/${dd}`;

// セール情報
const sales = [
  {
    title:'🔥 お買い物マラソン',
    url:'https://event.rakuten.co.jp/campaign/point-up/marathon/',
    start:'2026-03-21', 
    end:'2026-03-27',
    info:['上限：7000P','エントリー：必須'],
    type:'rakuten'
  },
  {
    title:'39キャンペーン',
    url:'https://event.rakuten.co.jp/campaign/point-up/39/',
    start:'2026-03-21',
    end:'2026-03-27',
    info:['上限：3000P','エントリー：必須'],
    type:'rakuten'
  },
  {
    title:'5と0のつく日',
    url:'https://event.rakuten.co.jp/campaign/point-up/5to0/',
    start:'2026-03-25',
    end:'2026-03-25',
    info:['エントリー：不要'],
    type:'rakuten'
  },
  // その他サービス例
  {
    title:'楽天トラベル セール',
    url:'https://travel.rakuten.co.jp/sale/',
    start:'2026-03-20',
    end:'2026-03-30',
    info:['上限：なし'],
    type:'other'
  },
  {
    title:'楽天ブックス 新刊キャンペーン',
    url:'https://books.rakuten.co.jp/event/',
    start:'2026-03-20',
    end:'2026-03-30',
    info:['送料無料キャンペーン中'],
    type:'other'
  },
  {
    title:'楽天ふるさと納税 特集',
    url:'https://event.rakuten.co.jp/furusato/',
    start:'2026-03-01',
    end:'2026-12-31',
    info:['返礼品多数'],
    type:'other'
  }
];

// 今日開催中のセールだけ表示
sales.forEach(sale => {
  const startDate = new Date(sale.start);
  const endDate = new Date(sale.end);
  if(today >= startDate && today <= endDate) {
    const container = sale.type==='rakuten' ? document.getElementById('rakuten-sales') : document.getElementById('other-sales');
    const itemDiv = document.createElement('div');
    itemDiv.className = 'item';
    
    const titleDiv = document.createElement('div');
    titleDiv.className = 'title';
    const a = document.createElement('a');
    a.href = sale.url;
    a.target = "_blank"; // 新しいタブで開く
    a.textContent = sale.title;
    titleDiv.appendChild(a);
    
    const infoDiv = document.createElement('div');
    infoDiv.className = 'info';
    // 本文に終了日を追加
    infoDiv.appendChild(document.createElement('div')).textContent = `終了日：${sale.end}`;
    sale.info.forEach(text => {
      const div = document.createElement('div');
      div.textContent = text;
      infoDiv.appendChild(div);
    });
    
    itemDiv.appendChild(titleDiv);
    itemDiv.appendChild(infoDiv);
    container.appendChild(itemDiv);
  }
});
</script>

</body>
</html>
