<!DOCTYPE html>
<html>
<head>

}

  font-size: 30px;
  margin-bottom: 8px;
}

.title a {

  text-decoration: none;
  font-size: 17px;
  font-weight: 600;
}

/* 情報（1行） */
.info {
  font-size: 14px;
  color: #333;
  white-space: nowrap;
}
</style>
</head>

<body>

<h1>楽天セールまとめ</h1>

</div>

<div class="item">

</body>
</html>
